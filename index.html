<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Timeline"/>
  <title>Timeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden; background: #000;
      font-family: -apple-system, "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
    }

    /* iPhone 14 Pro / Safari 높이 보정: 터치 로직은 건드리지 않고 화면 크기만 맞춤 */
    :root { --screen-h: 100vh; }
    @supports (height: 100svh) { :root { --screen-h: 100svh; } }
    @supports (height: 100dvh) { :root { --screen-h: 100dvh; } }

    /* ── SETUP ── */
    #setup {
      position: fixed; inset: 0; width: 100vw; height: var(--screen-h); background: #111;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 200;
      padding: env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px);
      transition: opacity 0.5s;
    }
    #setup.hide { opacity: 0; pointer-events: none; }
    .s-title { font-size: 36px; font-weight: 100; color: #fff; letter-spacing: 10px; margin-bottom: 6px; }
    .s-sub   { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 3px; margin-bottom: 44px; }
    .s-label { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 18px; text-align: center; }
    .picker  { display: flex; align-items: center; gap: 4px; margin-bottom: 44px; }
    .pcol    { display: flex; flex-direction: column; align-items: center; }
    .pbtn    { background: none; border: none; color: rgba(255,255,255,0.25); font-size: 24px; padding: 10px 24px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .pbtn:active { color: #fff; }
    .pval    { font-size: 74px; font-weight: 100; color: #fff; min-width: 2ch; text-align: center; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -2px; }
    .psep    { font-size: 74px; font-weight: 100; color: rgba(255,255,255,0.2); line-height: 1; padding-bottom: 8px; }
    .speed-row { display: flex; gap: 8px; margin-bottom: 44px; flex-wrap: wrap; justify-content: center; padding: 0 20px; }
    .spd { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); font-size: 12px; padding: 8px 14px; border-radius: 20px; cursor: pointer; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
    .spd.on  { background: #fff; border-color: #fff; color: #000; }
    .go-btn  { background: #fff; border: none; color: #000; font-size: 16px; font-weight: 500; letter-spacing: 1px; padding: 17px 0; width: min(300px, 80vw); border-radius: 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
    .go-btn:active { opacity: 0.7; }

    /* ── LOCK SCREEN ── */
    #lock {
      position: fixed; inset: 0; width: 100vw; height: var(--screen-h);
      display: flex; flex-direction: column; align-items: center;
      z-index: 100; overflow: hidden;
      opacity: 0; pointer-events: none; transition: opacity 0.6s;
    }
    #lock.show { opacity: 1; pointer-events: all; }

    .wp { position: absolute; inset: 0; width: 100vw; height: var(--screen-h); z-index: 0; background-size: cover; background-position: center center; }
    .wp-ov {
      position: absolute; inset: 0; width: 100vw; height: var(--screen-h); z-index: 1;
      background: linear-gradient(to bottom,
        rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.05) 22%,
        rgba(0,0,0,0.0) 40%, rgba(0,0,0,0.0) 65%,
        rgba(0,0,0,0.3) 100%);
    }

    /* STATUS BAR */
    .sb {
      position: relative; z-index: 10; width: 100%;
      display: flex; justify-content: space-between; align-items: center;
      padding: max(54px, env(safe-area-inset-top, 54px)) 24px 0;
    }
    .sb-carrier { font-size: 16px; font-weight: 600; color: #fff; }
    .sb-right   { display: flex; align-items: center; gap: 5px; }
    .sig { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
    .sig span { width: 3px; background: #fff; border-radius: 1px; }
    .badge-5g { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    .bat { position: relative; display: flex; align-items: center; }
    .bat-body {
      width: 27px; height: 13px;
      border: 1.5px solid rgba(255,255,255,0.75);
      border-radius: 3.5px; position: relative; overflow: hidden;
    }
    .bat-fill { position: absolute; left: 1.5px; top: 1.5px; bottom: 1.5px; width: 48%; background: #fff; border-radius: 2px; }
    .bat-tip  { width: 3px; height: 6px; background: rgba(255,255,255,0.5); border-radius: 0 1.5px 1.5px 0; margin-left: 1px; }

    /* DATE — 사진처럼 굵고 크게 */
    .l-date {
      position: relative; z-index: 10; margin-top: 14px;
      font-size: 22px; font-weight: 600;
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.3px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    }

    /* ── BIG TIME — 실제 iOS 완전 투명 아웃라인 ── */
    .l-time-wrap {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      width: 100%; overflow: visible;
      margin-top: 2px;
      /* 사진 기준 시간이 화면 폭 꽉 찰 정도로 큼 */
      height: clamp(130px, 38vw, 200px);
    }
    .l-time {
      /* 완전 투명 fill + 흰색 stroke — 배경이 비쳐보이는 효과 */
      font-size: clamp(110px, 33vw, 170px);
      font-weight: 100;
      color: transparent;
      -webkit-text-stroke: 1.8px rgba(255,255,255,0.80);
      text-stroke: 1.8px rgba(255,255,255,0.80);
      letter-spacing: -4px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      position: absolute;
      /* 미세한 glow로 깊이감 */
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.15)) drop-shadow(0 3px 12px rgba(0,0,0,0.4));
    }
    .l-time.enter { animation: tIn 0.22s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .l-time.exit  { animation: tOut 0.22s cubic-bezier(0.55,0,0.75,0.25) forwards; }
    @keyframes tIn  { from { transform: translateY(36px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    @keyframes tOut { from { transform: translateY(0); opacity:1; } to { transform: translateY(-36px); opacity:0; } }

    /* Hold ring */
    #holdRing {
      position: fixed;
      bottom: max(110px, calc(env(safe-area-inset-bottom,30px) + 80px));
      left: 50%; transform: translateX(-50%);
      z-index: 20; width: 64px; height: 64px;
      opacity: 0; pointer-events: none; transition: opacity 0.15s;
    }
    #holdRing.show { opacity: 1; }
    #holdRing svg { width: 64px; height: 64px; transform: rotate(-90deg); }
    #holdRing circle.track { fill: none; stroke: rgba(255,255,255,0.25); stroke-width: 4; }
    #holdRing circle.prog  { fill: none; stroke: #fff; stroke-width: 4; stroke-linecap: round;
      stroke-dasharray: 175; stroke-dashoffset: 175; }

    /* BOTTOM — 방해금지 모드 텍스트 + 아이콘 */
    .l-bottom {
      position: absolute;
      bottom: max(26px, env(safe-area-inset-bottom, 26px));
      left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      z-index: 10;
    }
    .bottom-icons {
      width: 100%;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 38px;
    }
    .b-icon {
      width: 54px; height: 54px;
      background: rgba(140,140,140,0.3);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }

    /* 방해금지 모드 — pill 없이 텍스트만, 사진처럼 가운데 */
    .dnd-label {
      display: flex; align-items: center; gap: 5px;
    }
    .dnd-moon-icon {
      width: 18px; height: 18px;
    }
    .dnd-text {
      font-size: 15px; font-weight: 500;
      color: rgba(255,255,255,0.88);
      letter-spacing: 0.1px;
    }

    .home-bar { width: 134px; height: 5px; background: rgba(255,255,255,0.32); border-radius: 3px; }

    #resetPill {
      position: fixed;
      bottom: max(96px, calc(env(safe-area-inset-bottom,30px) + 66px));
      left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 0.5px solid rgba(255,255,255,0.2); border-radius: 22px;
      padding: 13px 28px; color: #fff; font-size: 14px; cursor: pointer; z-index: 300;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
      -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif;
      white-space: nowrap;
    }
    #resetPill.show { opacity: 1; pointer-events: all; }


    /* iPhone 14 Pro CSS size: 393 × 852 기준 미세 조정 */
    @media screen and (width: 393px) and (height: 852px) {
      .sb { padding-top: 54px; padding-left: 24px; padding-right: 24px; }
      .l-date { margin-top: 14px; }
      .l-time-wrap { height: 160px; margin-top: 2px; }
      .l-time { font-size: 154px; letter-spacing: -4px; }
      .l-bottom { bottom: max(26px, env(safe-area-inset-bottom, 26px)); }
    }
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="s-title">TIMELINE</div>
  <div class="s-sub">TIME TRAVEL DEVICE</div>
  <div class="s-label">출발 시각 (현재보다 미래로 설정)</div>
  <div class="picker">
    <div class="pcol">
      <button class="pbtn" id="hU">▲</button>
      <div class="pval" id="hV">18</div>
      <button class="pbtn" id="hD">▼</button>
    </div>
    <div class="psep">:</div>
    <div class="pcol">
      <button class="pbtn" id="mU">▲</button>
      <div class="pval" id="mV">45</div>
      <button class="pbtn" id="mD">▼</button>
    </div>
  </div>
  <div class="s-label">역행 속도 (분/초)</div>
  <div class="speed-row">
    <button class="spd" data-v="2">느리게</button>
    <button class="spd on" data-v="1">보통</button>
    <button class="spd" data-v="0.5">빠르게</button>
    <button class="spd" data-v="0.2">매우 빠르게</button>
  </div>
  <button class="go-btn" id="goBtn">잠금화면으로 이동</button>
</div>

<!-- LOCK SCREEN -->
<div id="lock">
  <div class="wp" id="wpDiv"></div>
  <div class="wp-ov"></div>

  <div class="sb">
    <div class="sb-carrier">LG U+</div>
    <div class="sb-right">
      <div class="sig">
        <span style="height:4px"></span>
        <span style="height:7px"></span>
        <span style="height:10px"></span>
        <span style="height:13px; opacity:0.35"></span>
      </div>
      <div class="badge-5g">5G</div>
      <div class="bat">
        <div class="bat-body"><div class="bat-fill"></div></div>
        <div class="bat-tip"></div>
      </div>
    </div>
  </div>

  <div class="l-date" id="lDate"></div>

  <div class="l-time-wrap">
    <div class="l-time" id="lTime"></div>
  </div>

  <div class="l-bottom">
    <div class="bottom-icons">
      <!-- Flashlight -->
      <div class="b-icon">
        <svg width="22" height="28" viewBox="0 0 22 28" fill="none">
          <path d="M6 9 L16 9 L14 4 L8 4 Z" fill="white"/>
          <rect x="7.5" y="9" width="7" height="13" rx="1.5" fill="white"/>
          <circle cx="11" cy="8.5" r="2.8" fill="rgba(180,220,255,0.55)" stroke="white" stroke-width="0.8"/>
          <line x1="8" y1="12" x2="14" y2="12" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
          <line x1="8" y1="14.5" x2="14" y2="14.5" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
          <line x1="8" y1="17" x2="14" y2="17" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
          <rect x="9" y="22" width="4" height="3" rx="1" fill="rgba(255,255,255,0.7)"/>
          <line x1="11" y1="2" x2="11" y2="0.5" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
          <line x1="7.5" y1="3" x2="6.5" y2="1.8" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
          <line x1="14.5" y1="3" x2="15.5" y2="1.8" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </div>

      <!-- 방해금지 모드 — 가운데 -->
      <div class="dnd-label">
        <svg class="dnd-moon-icon" viewBox="0 0 18 18" fill="none">
          <path d="M15.5 11.5A7 7 0 0 1 6.5 2.5a7 7 0 1 0 9 9z"
                fill="rgba(255,255,255,0.85)"/>
        </svg>
        <span class="dnd-text">방해금지 모드</span>
      </div>

      <!-- Camera -->
      <div class="b-icon">
        <svg width="28" height="24" viewBox="0 0 28 24" fill="none">
          <rect x="1" y="5" width="26" height="17" rx="3.5" fill="white"/>
          <path d="M10 5 L10 2.5 Q10 1 11.5 1 L16.5 1 Q18 1 18 2.5 L18 5 Z" fill="white"/>
          <circle cx="14" cy="13.5" r="5.8" fill="rgba(40,40,50,0.85)" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
          <circle cx="14" cy="13.5" r="4.2" fill="rgba(20,20,30,0.9)"/>
          <circle cx="14" cy="13.5" r="2.8" fill="rgba(60,80,120,0.6)"/>
          <circle cx="12.5" cy="12" r="1" fill="rgba(255,255,255,0.3)"/>
          <circle cx="4.5" cy="8.5" r="1.2" fill="rgba(255,255,255,0.8)"/>
        </svg>
      </div>
    </div>
    <div class="home-bar"></div>
  </div>
</div>

<!-- Hold ring -->
<div id="holdRing">
  <svg viewBox="0 0 64 64">
    <circle class="track" cx="32" cy="32" r="28"/>
    <circle class="prog" cx="32" cy="32" r="28" id="progCircle"/>
  </svg>
</div>

<button id="resetPill">✎ 다시 설정</button>

  document.getElementById('hU').onclick=function(){ tH=(tH+1)%24; syncP(); };
  document.getElementById('hD').onclick=function(){ tH=(tH+23)%24; syncP(); };
  document.getElementById('mU').onclick=function(){ tM=(tM+1)%60; syncP(); };
  document.getElementById('mD').onclick=function(){ tM=(tM+5)%60; syncP(); };
  document.querySelectorAll('.spd').forEach(function(b){
    b.onclick=function(){
      document.querySelectorAll('.spd').forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on'); secPerMin=parseFloat(b.dataset.v);
    };
  });

  var currentH=-1, currentM=-1;
  function writeTimeDirect(h,m){
    document.getElementById('lTime').textContent=h+':'+pad(m);
    currentH=h; currentM=m;
  }
  function setTime(h,m){
    if(h===currentH && m===currentM) return;
    var wrap=document.querySelector('.l-time-wrap');
    var old=document.getElementById('lTime');
    var next=document.createElement('div');
    next.className='l-time enter'; next.id='lTime';
    next.textContent=h+':'+pad(m);
    wrap.appendChild(next);
    old.id=''; old.classList.add('exit');
    setTimeout(function(){ old.remove(); },260);
    currentH=h; currentM=m;
  }

  var interval=null, started=false, tapCount=0, tapTimer=null;

  document.getElementById('goBtn').onclick=function(){
    var now=new Date();
    document.getElementById('lDate').textContent=getDateLabel(now);
    writeTimeDirect(tH,tM);
    document.getElementById('setup').classList.add('hide');
    setTimeout(function(){ document.getElementById('lock').classList.add('show'); },100);
  };

  function startTravel(){
    if(started) return;
    var now=new Date();
    var realMin=now.getHours()*60+now.getMinutes();
    var startMin=tH*60+tM;
    if(startMin<=realMin){ alert('출발 시각이 현재 시각보다 미래여야 합니다!'); return; }
    started=true;
    var simMin=startMin;
    interval=setInterval(function(){
      simMin--;
      if(simMin<0) simMin+=24*60;
      var sH=Math.floor(simMin/60)%24, sM=simMin%60;
      setTime(sH,sM);
      var now2=new Date();
      var realNow=now2.getHours()*60+now2.getMinutes();
      if(simMin<=realNow){
        clearInterval(interval); started=false;
        setTime(now2.getHours(),now2.getMinutes());
      }
    }, secPerMin*1000);
  }

  var HOLD_MS=2000, CIRCUM=175;
  var ring=document.getElementById('holdRing');
  var progEl=document.getElementById('progCircle');
  var rafId=null, holdStart=null;

  function onDown(e){
    if(e.target.closest && e.target.closest('#resetPill')) return;
    if(started) return;
    holdStart=Date.now();
    ring.classList.add('show');
    progEl.style.strokeDashoffset=CIRCUM;
    function tick(){
      var elapsed=Date.now()-holdStart;
      var ratio=Math.min(elapsed/HOLD_MS,1);
      progEl.style.strokeDashoffset=CIRCUM*(1-ratio);
      if(ratio<1){ rafId=requestAnimationFrame(tick); }
      else{ ring.classList.remove('show'); progEl.style.strokeDashoffset=CIRCUM; startTravel(); }
    }
    rafId=requestAnimationFrame(tick);
  }
  function onUp(){
    if(!holdStart) return;
    cancelAnimationFrame(rafId); holdStart=null;
    ring.classList.remove('show'); progEl.style.strokeDashoffset=CIRCUM;
  }

  var lockEl=document.getElementById('lock');
  lockEl.addEventListener('touchstart', onDown,{passive:true});
  lockEl.addEventListener('touchend',   onUp);
  lockEl.addEventListener('touchcancel',onUp);
  lockEl.addEventListener('mousedown',  onDown);
  lockEl.addEventListener('mouseup',    onUp);
  lockEl.addEventListener('mouseleave', onUp);

  lockEl.addEventListener('click',function(){
    tapCount++;
    clearTimeout(tapTimer);
    tapTimer=setTimeout(function(){ tapCount=0; },600);
    if(tapCount>=3){
      tapCount=0;
      var pill=document.getElementById('resetPill');
      pill.classList.add('show');
      setTimeout(function(){ pill.classList.remove('show'); },3000);
    }
  });

  document.getElementById('resetPill').onclick=function(){
    clearInterval(interval); started=false;
    document.getElementById('resetPill').classList.remove('show');
    lockEl.classList.remove('show');
    tapCount=0; currentH=-1; currentM=-1;
    document.querySelector('.l-time-wrap').innerHTML='<div class="l-time" id="lTime"></div>';
    document.getElementById('setup').classList.remove('hide');
  };

  syncP();
</script>
</body>
</html>
